<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hustle Hub Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Hustle Hub Pro</h1>
            <div id="live-clock">Loading time...</div>
        </header>

        <section class="input-section">
            <input type="text" id="platform-name" placeholder="Platform Name (e.g. Outlier)">
            <select id="platform-status">
                <option value="Active">Active</option>
                <option value="Waiting">Waiting</option>
                <option value="Testing">Testing</option>
            </select>
            <input type="text" id="platform-note" placeholder="Quick note...">
            <button onclick="addHustle()">Add Hustle</button>
        </section>

        <section class="tracker-section">
            <table>
                <thead>
                    <tr>
                        <th>Platform</th>
                        <th>Status</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="hustle-list">
                    </tbody>
            </table>
        </section>

        <section class="wisdom-section">
            <div id="quote-display">
                <p id="quote-text">"Loading wisdom..."</p>
                <span id="quote-author"></span>
            </div>
            <button onclick="getNewQuote()">New Vibe</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
